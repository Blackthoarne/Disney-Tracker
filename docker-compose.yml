services:
  first-light:
    build: .
    image: ghcr.io/blackthoarne/disney-tracker:latest
    container_name: first-light
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./appdata:/config
    environment:
      TZ: America/New_York
      # Set an admin token to enable /admin and curated writes.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
